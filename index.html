<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Monapart: Tu Futuro Inmobiliario</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&family=Lora:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --monapart-dark: #2d2d2c;
            --monapart-accent: #a36756;
            --monapart-grey: #f4f7f6;
            --bg-white: #ffffff;
            /* Colores del Arco */
            --color-nomina: #2d2d2c;
            --color-broker: #669eac;
            --color-plataforma: #a9984a;
            --color-solitario: #a36756;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--monapart-grey);
            color: var(--monapart-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #app-container {
            width: 95%;
            max-width: 900px;
            height: 90vh;
            background: var(--bg-white);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 60px; /* Márgenes amplios pero no excesivos */
        }

        /* Tipografía Introducción */
        .intro-title { 
            font-family: 'Roboto', sans-serif;
            font-weight: 300; 
            font-size: 42px; /* 50% más grande que el base de 28px */
            color: var(--monapart-accent); 
            margin-bottom: 25px;
            text-transform: none;
        }

        .intro-text {
            font-family: 'Lora', serif;
            font-weight: 400;
            font-size: 24px; /* 50% más grande que el base de 16px */
            color: var(--monapart-dark);
            line-height: 1.4;
            margin-bottom: 35px;
            text-transform: lowercase;
        }
        .intro-text::first-letter { text-transform: uppercase; }

        .btn-intro {
            background-color: var(--monapart-dark);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            font-size: 24px; /* 50% más grande */
            transition: opacity 0.3s;
            align-self: flex-start;
        }

        /* Cuestionario */
        .question-counter {
            font-family: 'Roboto', sans-serif;
            font-weight: 400;
            color: var(--monapart-dark);
            margin-bottom: 10px;
        }

        .question-text { 
            font-family: 'Roboto', sans-serif;
            font-size: 18px; 
            margin-bottom: 25px; 
            color: var(--monapart-dark); 
        }

        .option-item {
            font-family: 'Roboto', sans-serif;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .option-item:hover { background: #f9f9f9; }
        .option-item.selected { background: var(--monapart-dark); color: white; border-color: var(--monapart-dark); }

        .btn-next {
            background-color: var(--monapart-dark);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            align-self: flex-end;
        }
        .btn-next:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Marcador SVG */
        .gauge-wrapper { width: 100%; max-width: 500px; margin: 0 auto; position: relative; }
        #gauge-svg { width: 100%; height: auto; }
        .needle { fill: #ff8c00; transition: transform 1.5s ease-in-out; transform-origin: 250px 250px; }
        
        /* Texto de resultados - Corrección de lectura */
        .result-content { 
            flex-grow: 1; 
            overflow-y: auto; 
            margin-top: 20px; 
            padding-right: 15px;
            max-height: 40vh;
        }
        .result-text { font-family: 'Roboto', sans-serif; font-size: 15px; line-height: 1.6; color: #444; }

        /* Pantallas */
        .screen { display: none; flex-direction: column; height: 100%; }
        .screen.active { display: flex; }

        input[type="text"], input[type="email"] { padding: 12px; border: 1px solid #ddd; margin-bottom: 10px; font-family: 'Roboto'; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="intro-screen" class="screen active" style="justify-content: center;">
        <h1 class="intro-title">Descubre TU modelo de trabajo ideal</h1>
        <p class="intro-text">¿Eres un agente en nómina, un asociado a un broker o un agente independiente? A través de este cuestionario diseñado bajo criterios de psicología organizacional y análisis de mercado, evaluaremos tu perfil profesional ideal</p>
        <button class="btn-intro" onclick="startQuiz()">Quiero empezar el test</button>
    </div>

    <div id="quiz-screen" class="screen">
        <p id="question-counter" class="question-counter"></p>
        <div class="question-text" id="question-text"></div>
        <div id="options-container"></div>
        <button class="btn-next" id="next-btn" disabled onclick="nextQuestion()">Siguiente</button>
    </div>

    <div id="lead-screen" class="screen">
        <h2 style="margin-bottom:20px">Calculando tu perfil...</h2>
        <form id="lead-form" onsubmit="event.preventDefault(); submitLead();">
            <input type="text" id="fname" placeholder="Nombre" required style="width:100%">
            <input type="text" id="lname" placeholder="Apellido" required style="width:100%">
            <input type="email" id="email" placeholder="Email" required style="width:100%">
            <div style="font-size:12px; margin: 15px 0; display:flex; gap:10px">
                <input type="checkbox" id="rgpd" required>
                <label for="rgpd">Doy permiso a Monapart para suscribirme a su newsletter y enviarme información comercial en virtud de la RGPD.</label>
            </div>
            <button type="submit" class="btn-next" style="width:100%">Muéstrame el resultado</button>
        </form>
    </div>

    <div id="result-screen" class="screen">
        <div class="gauge-wrapper">
            <svg id="gauge-svg" viewBox="0 0 500 300">
                <defs>
                    <path id="path-nomina" d="M 100 250 A 150 150 0 0 1 144 144" />
                    <path id="path-broker" d="M 144 144 A 150 150 0 0 1 250 100" />
                    <path id="path-plataforma" d="M 250 100 A 150 150 0 0 1 356 144" />
                    <path id="path-solitario" d="M 356 144 A 150 150 0 0 1 400 250" />
                </defs>
                <path d="M 50 250 A 200 200 0 0 1 108.5 108.5" fill="none" stroke="#2d2d2c" stroke-width="60" />
                <path d="M 108.5 108.5 A 200 200 0 0 1 250 50" fill="none" stroke="#669eac" stroke-width="60" />
                <path d="M 250 50 A 200 200 0 0 1 391.5 108.5" fill="none" stroke="#a9984a" stroke-width="60" />
                <path d="M 391.5 108.5 A 200 200 0 0 1 450 250" fill="none" stroke="#a36756" stroke-width="60" />
                
                <text font-family="Roboto" font-size="14" fill="white" text-anchor="middle">
                    <textPath href="#path-nomina" startOffset="50%">nómina</textPath>
                </text>
                <text font-family="Roboto" font-size="14" fill="white" text-anchor="middle">
                    <textPath href="#path-broker" startOffset="50%">con broker</textPath>
                </text>
                <text font-family="Roboto" font-size="14" fill="white" text-anchor="middle">
                    <textPath href="#path-plataforma" startOffset="50%">plataforma</textPath>
                </text>
                <text font-family="Roboto" font-size="14" fill="white" text-anchor="middle">
                    <textPath href="#path-solitario" startOffset="50%">en solitario</textPath>
                </text>

                <line id="needle" x1="250" y1="250" x2="60" y2="250" stroke="#ff8c00" stroke-width="3" stroke-linecap="round" />
                <circle cx="250" cy="250" r="6" fill="#2d2d2c" />
            </svg>
        </div>
        <div class="result-content">
            <h2 id="result-title" style="color:#2d2d2c; margin-bottom:10px"></h2>
            <div id="result-text" class="result-text"></div>
        </div>
        <button class="btn-next" style="margin-top:20px; align-self:center" onclick="alert('Enviando informe...')">Enviar resultado por email</button>
    </div>
</div>

<script>
    const questions = [
        { q: "¿En qué medida consideras que tus resultados actuales son una consecuencia directa de tu esfuerzo y talento individual frente a factores externos?", w: 1.2, a: ["Mis resultados dependen exclusivamente de mi gestión, mi capacidad y mi trabajo diario.", 10, "Mi esfuerzo es determinante, aunque reconozco que el mercado y los recursos y el apoyo de mi empresa influyen significativamente.", 6, "Mis resultados están ligados principalmente al prestigio de la marca, la calidad de los leads que recibo y la situación económica.", 0] },
        { q: "Ante un fracaso en una operación, ¿sueles analizar tu propia gestión o buscar la causa en las circunstancias del mercado y la empresa?", w: 1.0, a: ["Analizo mi proceso de principio a fin para identificar qué errores cometí y cómo puedo mejorar.", 10, "Evalúo mis acciones, pero también analizo si hubo fallos en el soporte de la empresa o cambios bruscos en el mercado.", 6, "Mi experiencia es que muchos fracasos son imputables a la falta de apoyo o las condiciones externas impidieron el cierre.", 0] },
        { q: "¿Qué nivel de variabilidad en tus ingresos mensuales estás dispuesto a tolerar antes de que afecte negativamente a tu bienestar emocional?", w: 1.5, a: ["Tolero cualquier variabilidad; entiendo que los picos y valles son parte intrínseca del negocio de alto rendimiento.", 10, "Puedo gestionar emocionalmente variaciones moderadas de ingresos siempre que tenga una seguridad mínima a medio plazo.", 6, "Necesito una alta estabilidad; me genera mucha ansiedad no saber con exactitud cuánto dinero entrará cada mes.", 0] },
        { q: "¿Cómo de cómodo te sientes tomando decisiones de inversión o estrategia sin tener garantías absolutas sobre el retorno?", w: 1.2, a: ["Me siento cómodo; asumo que el riesgo es necesario para obtener beneficios superiores.", 10, "Actúo con cautela, asumiendo riesgos solo si están muy calculados y tengo un plan de contingencia.", 6, "Nada cómodo; prefiero no tomar ninguna iniciativa que no tenga un éxito prácticamente garantizado, aunque el beneficio sea menor.", 0] },
        { q: "¿Qué valor le das a tener libertad total para decidir tus propios métodos de trabajo, horarios y procesos sin supervisión externa?", w: 1.2, a: ["Es mi máxima prioridad; no acepto que nadie supervise mi agenda ni cuestione mi metodología.", 10, "Valoro mucho la autonomía, aunque me gusta tener un marco de referencia o procesos generales en los que apoyarme.", 6, "Prefiero que me marquen las pautas, los horarios y los procesos para sentir que voy por el camino correcto.", 0] },
        { q: "¿Hasta qué punto te genera frustración tener que solicitar aprobación para implementar cambios o nuevas ideas en tu operativa diaria?", w: 1.0, a: ["Me frustra profundamente; siento que los procesos de aprobación frenan mi agilidad y mi capacidad de innovar. Sé mejor que nadie qué necesito.", 10, "No me supone un problema e incluso me gusta contar con las opiniones de otros, pero preferiría tener la última palabra.", 6, "No me molesta en absoluto; me da seguridad que un superior valide mis decisiones antes de ejecutarlas.", 0] },
        { q: "¿Te sientes capaz de generar el mismo volumen de negocio si dejaras de contar con el respaldo de tu marca o estructura actual hoy mismo?", w: 1.5, a: ["Sin ninguna duda; mis clientes confían en mi marca personal y me seguirían a cualquier lugar.", 10, "Probablemente sí, aunque reconozco que al principio me costaría más esfuerzo generar la misma confianza.", 6, "No; creo que gran parte de mi volumen actual se debe al prestigio, los compañeros, los recursos y el nombre de la empresa actual.", 0] },
        { q: "¿Confías plenamente en tu habilidad para resolver problemas técnicos o comerciales complejos de forma solitaria y sin apoyo técnico inmediato?", w: 1.0, a: ["Sí; tengo los conocimientos necesarios o la capacidad de resolución para encontrar la salida por mi cuenta.", 10, "En la mayoría de los casos sí, aunque puntualmente agradezco tener un departamento experto a quien consultar.", 6, "Prefiero delegar o consultar esos problemas a especialistas para evitar cometer errores legales o técnicos graves.", 0] },
        { q: "¿Qué pesa más en tu balanza de satisfacción laboral: la estabilidad de un entorno predecible o la libertad de ser tu propio jefe?", w: 1.5, a: ["La libertad absoluta de ser dueño de mi destino profesional es innegociable para mí.", 10, "Busco un equilibrio donde pueda tener independencia pero con el respaldo de una estructura sólida.", 6, "La estabilidad y la seguridad que me ofrece pertenecer a una organización consolidada son mi prioridad.", 0] },
        { q: "¿Renunciarías a la red de protección de una nómina (paro, vacaciones pagadas, indemnización) a cambio de una comisión más alta?", w: 1.5, a: ["Sí, prefiero cobrar el máximo por operación y gestionar yo mis ahorros y descansos.", 10, "Me lo plantearía solo si el aumento de ingresos me permite ahorrar lo suficiente para compensar esa falta de seguridad.", 6, "No, valoro demasiado la estabilidad y las garantías legales que ofrece un contrato laboral.", 0] },
        { q: "¿Prefieres trabajar siguiendo procesos operativos ya definidos por otros o disfrutas diseñando tus propios protocolos desde cero?", w: 1.0, a: ["Disfruto creando mis propios sistemas de trabajo y optimizándolos según mi criterio personal.", 10, "Me gusta tener una base de procesos ya definida que yo pueda adaptar o retocar a mi manera.", 6, "Prefiero seguir un manual de procedimientos claro y probado que me diga exactamente qué hacer en cada paso.", 0] },
        { q: "¿En qué medida consideras que el soporte administrativo y logístico de una organización es el motor principal de tu productividad?", w: 1.2, a: ["En absoluto; yo gestiono mis propios recursos y soy capaz de administrar mi actividad de forma independiente.", 10, "Es una ayuda importante que me libera tiempo, pero no considero que sea el factor crítico para mis ventas.", 6, "Es fundamental; sin ese soporte administrativo y logístico, mi productividad caería drásticamente.", 0] },
        { q: "¿Eres capaz de mantener un alto nivel de actividad y rigor profesional cuando no tienes a nadie a quien rendir cuentas diariamente?", w: 1.2, a: ["Por supuesto; soy extremadamente autoexigente con mis objetivos y no necesito presión o motivación externa para rendir.", 10, "Generalmente sí, aunque reconozco que puntualmente me vendría bien un poco de motivación externa para no dispersarme.", 6, "Me cuesta mucho ser constante si no tengo objetivos marcados por un jefe y un control de mi actividad diaria.", 0] },
        { q: "¿Cómo gestionas tu priorización de tareas cuando te enfrentas a múltiples demandas sin tener una jerarquía de mando que marque las pautas?", w: 1.0, a: ["Decido con rapidez y eficacia basándome exclusivamente en la rentabilidad y el valor estratégico de cada tarea.", 10, "Me tomo mi tiempo para analizarlo y suelo priorizar bien, aunque a veces dudo sobre qué es lo más urgente.", 6, "Me siento sobrepasado por la falta de dirección y prefiero que alguien con más autoridad me ayude a priorizar.", 0] },
        { q: "¿Te ves dedicando una parte significativa de tu semana a tareas administrativas, fiscales y de marketing que no son ventas directas?", w: 1.0, a: ["Sí; entiendo y acepto que gestionar esas áreas es parte esencial de ser un profesional de alto nivel.", 10, "Lo acepto como un trámite necesario, aunque trato de dedicarle el menor tiempo posible para volver a la calle.", 6, "No; yo soy un vendedor puro y quiero que otra persona se encargue de todo el papeleo y el marketing.", 0] },
        { q: "¿Consideras que gestionar tu propia infraestructura técnica y legal es un reto estimulante o una distracción que te aleja de tu talento?", w: 1.0, a: ["Es un reto estimulante tener el control total sobre todas las herramientas y aspectos legales de mi actividad.", 10, "Es una tarea necesaria de la que puedo ocuparme si cuento con herramientas sencillas que me faciliten la labor.", 6, "Es una distracción molesta y estresante que me quita tiempo de lo que realmente me apasiona y sé hacer.", 0] },
        { q: "¿Cuánto valoras el contacto social diario y el hecho de compartir éxitos y fracasos con un equipo en un espacio físico común?", w: 0.8, a: ["Nada; prefiero trabajar solo, me concentro mejor y me distraen las interacciones constantes de una oficina.", 10, "Lo valoro puntualmente o en reuniones periódicas, pero no necesito una oficina diaria para mantenerme motivado.", 6, "Muchísimo; el ambiente de equipo, el café con los compañeros y el contacto humano son vitales para mi bienestar.", 0] },
        { q: "¿Hasta qué punto es fundamental para ti sentirte identificado con los valores y la cultura de una marca corporativa superior?", w: 0.8, a: ["Es irrelevante; mi ética, mis valores y mi reputación personal están por encima de cualquier marca.", 10, "Es importante; me gusta trabajar acompañada/o de una marca que sea coherente con mis principios.", 6, "Es fundamental; necesito sentir que formo parte de algo más grande que yo y que comparto una cultura de empresa.", 0] },
        { q: "¿Prefieres desconectar totalmente del trabajo al salir de un entorno físico de oficina o no te importa integrar vida profesional y personal de forma fluida?", w: 0.8, a: ["No me importa integrarlas; mi trabajo es mi estilo de vida y yo decido cuándo y desde dónde trabajo.", 10, "Trato de separarlas, aunque acepto cierta flexibilidad y puedo atender asuntos profesionales en mi tiempo personal.", 6, "Necesito una separación estricta; cuando salgo de mi lugar de trabajo, mi mente debe desconectar al 100%.", 0] },
        { q: "¿Tienes la capacidad de establecer límites estrictos a tus clientes y a ti mismo cuando el entorno de trabajo depende exclusivamente de tu gestión?", w: 0.8, a: ["Sí; soy muy estricto con mi tiempo, sé decir \"no\" y mis clientes respetan mis reglas de disponibilidad.", 10, "Lo intento, aunque a veces la presión del negocio me hace ceder y atender demandas fuera de mi horario previsto.", 6, "Me cuesta mucho; suelo acabar disponible las 24 horas si no tengo una estructura que regule mi atención al cliente.", 0] },
        { q: "¿Cuánto tiempo tardas en recuperar tu nivel de motivación habitual tras perder una operación importante o enfrentar un rechazo directo?", w: 1.0, a: ["Casi de forma instantánea; entiendo el rechazo como estadística y paso a la siguiente oportunidad sin dudar.", 10, "Unas horas o un día; analizo qué falló, lo proceso y vuelvo a la carga con energía renovada.", 6, "Varios días; los fracasos me afectan personalmente y me cuesta recuperar el ritmo de trabajo habitual.", 0] },
        { q: "¿Te sientes emocionalmente preparado para afrontar rachas de baja actividad prolongadas sin el soporte moral de un equipo o un responsable?", w: 1.2, a: ["Totalmente; tengo la fortaleza mental y el pulmón financiero para aguantar y persistir por mi cuenta.", 10, "Sí, aunque reconozco que en los momentos bajos es cuando más echo de menos tener a alguien que me respalde.", 6, "No; la soledad en los momentos de baja actividad me desmotiva rápidamente y me hace dudar de mi capacidad.", 0] },
        { q: "Ante la escasez de oferta y la alta competencia actual, ¿cómo planteas tu estrategia de captación de exclusivas?", w: 1.4, a: ["Confío en mi capacidad de prospección directa y en mi red de contactos personal para generar mis propias oportunidades sin depender de nadie.", 10, "Utilizaré mi red personal, pero creo que necesitaré contar con herramientas de marketing avanzadas y el prestigio de una marca para diferenciarme más.", 6, "Prefiero que la empresa invierta en marketing y generación de leads para que yo pueda centrarme exclusivamente en la gestión comercial.", 0] },
        { q: "¿Cómo gestionas la creciente complejidad legal y los cambios normativos constantes en el sector inmobiliario?", w: 1.2, a: ["Me mantengo permanentemente informado por mi cuenta y asumo la responsabilidad total de la seguridad jurídica de mis operaciones.", 10, "Me encargo de la gestión, pero me interesaría contar con un respaldo que me mantenga actualizado y me proporcione herramientas legales validadas.", 6, "No quiero riesgos; necesito que un departamento legal especializado supervise y valide cada contrato y documento que firmo.", 0] },
        { q: "Dada la posibilidad de estar al final de un ciclo (precios máximos y posible enfriamiento), ¿cuál es tu plan de contingencia financiero?", w: 1.3, a: ["Entiendo los ciclos del mercado y ajusto mi estructura de costes e inversión al máximo para ser rentable incluso si bajan las ventas.", 10, "Soy consciente de la situación y valoraría incorporarme a un modelo de costes variables que me permita ser flexible si el mercado se frena.", 6, "Ante una posible crisis de mercado, mi prioridad absoluta es mantener la seguridad de unos ingresos fijos garantizados.", 0] },
        { q: "¿Qué posición adoptas ante la irrupción de la Inteligencia Artificial y las nuevas tecnologías en tu operativa diaria?", w: 1.1, a: ["Investigo e implemento proactivamente mis propias herramientas de IA para ganar eficiencia y superar a la competencia por mi cuenta.", 10, "Adopto las innovaciones tecnológicas pero valoro que me lleguen filtradas y testadas por un tercero que conoce mis necesidades.", 6, "Prefiero seguir con los métodos tradicionales que me han funcionado y que la empresa decida qué tecnología debemos usar todos.", 0] }
    ];

    const resultTexts = {
        nom_low: "Tus respuestas dibujan un perfil con un protagonismo sobre tus resultados externo dominante y una alta necesidad de seguridad psicológica. Científicamente, esto indica que tu productividad florece cuando los factores de estrés ambiental están bajo el control de una organización. No es falta de ambición, es optimización de energía: prefieres canalizar todo tu talento hacia el cliente en lugar de malgastarlo peleando con Hacienda. Para ti, la red de protección de un contrato laboral es el andamio que te permite subir más alto. Eres el activo ideal para estructuras corporativas que necesitan 'vendedores puros'. Disfrutas del ritual de la oficina y de saber que, pase lo que pase, el día 30 tu cuenta emitirá un sonido reconfortante. Si alguna vez te sientes tentado por la aventura solitaria, recuerda que ser tu propio jefe implica ser tu propio administrativo, y esa es una relación que prefieres evitar.",
        nom_high: "Tu perfil muestra una autoeficacia performativa latente, pero frenada por una baja tolerancia a la incertidumbre. Te gusta el juego inmobiliario y te sientes capaz de liderar operaciones complejas, pero valoras demasiado la infraestructura compartida. La ciencia organizacional sugiere que eres un 'intraemprendedor': alguien que quiere proponer y crecer, pero bajo un paraguas de marca que ya haya hecho el trabajo sucio. Te sientes cómodo donde el soporte administrativo es el motor de tu productividad. Tu bienestar emocional está ligado a la estabilidad, y eso es inteligente; no todo el mundo tiene por qué disfrutar de la 'montaña rusa' del autónomo. Tu modelo ideal es una agencia consolidada con incentivos por objetivos pero con red de seguridad. Eso sí, asegúrate de que tu empresa no sea rígida, porque tienes un punto de autonomía que podría asfixiarse.",
        bro_low: "Tus resultados indican una transición clara hacia la independencia, pero con un anclaje fuerte en la necesidad de afiliación. Posees la disciplina para ser autónomo, pero el 'lobo solitario' no es tu animal espiritual. Necesitas el contacto social diario y el refuerzo de un equipo presencial. El modelo de broker tradicional te ofrece lo que buscas: una oficina donde tomar café y comentar las jugadas, un líder que marque dirección y una estructura física que separe casa y trabajo. Operas mejor en una comunidad local con marca reconocida. Tu resiliencia se apoya en el grupo; los meses flojos se pasan mejor compartiendo la frustración en el office. Es un modelo honesto, siempre que el porcentaje que cedes te parezca un precio justo por evitar la soledad del corredor de fondo.",
        bro_high: "Estás en un punto de inflexión psicológico interesante. Tu anclaje de carrera se ha desplazado hacia la independencia, pero tu necesidad de estructura aún te mantiene ligado a modelos tradicionales. Eres un agente con gran capacidad de autogestión que teme el vacío de gestionar tecnología, marketing y soporte legal por cuenta propia. Por eso buscas el refugio de un broker: seguridad jurídica a cambio de una parte de tu beneficio. Sin embargo, podrías estar 'pagando de más'. Deberías vigilar si el soporte justifica el reparto de comisiones. En un mercado tecnológico, perfiles como el tuyo a menudo descubren que el modelo de plataforma de servicios es el paso lógico: misma infraestructura pero con mucha más libertad y retorno mayor. En un escenario de mercado cambiante, este salto será casi obligatorio para mantener tu competitividad.",
        plat_1: "Tu perfil es el del pragmático por excelencia. Tienes un protagonismo sobre tus resultados muy fuerte: sabes que tus éxitos dependen de ti y no tienes miedo a volar sin motor. Pero tu autoeficacia está unida a un sentido práctico: ¿por qué perder tres horas en contratos o edición de vídeo si una plataforma lo hace profesionalmente? Entiendes que tu tiempo es dinero y tu zona de genialidad es el cierre. El modelo de plataforma es tu simbiosis perfecta. Eres un empresario de ti mismo que utiliza servicios compartidos como apalancamiento operativo. No necesitas oficina para motivarte, pero eres inteligente para no querer estar solo ante el peligro. Tienes la libertad del autónomo y la potencia de fuego de una multinacional.",
        plat_2: "Tus respuestas demuestran una alta capacidad de adaptación al mercado. Eres consciente de que la IA, los cambios normativos y la escasez de oferta exigen un agente más sofisticado y menos 'artesanal'. Tu perfil puntúa alto en curiosidad tecnológica y resiliencia. No buscas una agencia que te diga qué hacer, sino una plataforma que te dé las armas más avanzadas. Te sientes cómodo en la liquidez actual. No te asusta el final de ciclo porque confías en tu capacidad para ajustar costes. El modelo de plataforma te encaja como un guante: respeta tu independencia total mientras te mantiene actualizado. Prefieres invertir en tu propio crecimiento que en el alquiler de la oficina de un broker. Tu operativa es pura eficiencia.",
        plat_3: "Tu prioridad absoluta es la gestión de límites. Has alcanzado un nivel de madurez donde entiendes que el éxito no es solo facturar, sino ser dueño de tu tiempo. Tu puntuación en autonomía es altísima; no necesitas vigilancia porque tu propia disciplina es más exigente que cualquier jefe. Buscas un ecosistema que elimine las fricciones diarias. El modelo de plataforma te permite integrar vida personal y profesional sin ataduras presenciales ni pesadillas administrativas. Eres un agente de alto rendimiento que ha decidido no ser esclavo de su estructura. Al delegar lo rutinario, aseguras que tu negocio trabaje para ti, y no al revés. Tienes el control total y el silencio administrativo necesario para enfocarte en tu pasión.",
        plat_4: "Estás rozando el límite superior de la independencia, pero tu realismo económico te mantiene dentro de la plataforma. Tu análisis de coste de oportunidad te dice que, aunque podrías hacerlo todo solo, no sería rentable. Posees una resiliencia envidiable y una visión de mercado aguda. Sabes que el prestigio de una plataforma sólida y el soporte experto multiplican tu valor ante clientes de alto nivel. Eres un perfil atractivo para cualquier modelo, pero ya has decidido que no quieres techos. La plataforma es tu socio silencioso: no interfiere en tus decisiones pero asegura una infraestructura impecable. Probablemente seas el referente de tu zona y tus clientes te busquen a ti, no a las siglas de tu tarjeta.",
        solo: "Eres el 'Lobo Estepario' del sector. Tu autoeficacia es máxima y tu tolerancia al riesgo, absoluta. Tienes una necesidad de autonomía radical: cualquier estructura externa te genera fricción. Estás dispuesto a asumir la carga total del back-office con tal de no rendir cuentas ni compartir honorarios. Eres una inmobiliaria unipersonal. Disfrutas el control total del proceso. Pero cuidado: en un escenario de hiper-especialización tecnológica o cambios legales complejos, la carga de gestionar la estructura solo puede canibalizar tu tiempo de venta. Si el papeleo empieza a quitarte más de lo que te da, considera que una plataforma de servicios no es perder independencia, sino externalizar el mantenimiento para seguir siendo el arquitecto jefe. Por ahora, disfruta de tu reino 100% tuyo."
    };

    let currentIdx = 0;
    let score = 0;
    let selectedValue = null;

    function startQuiz() {
        document.getElementById('intro-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById('question-counter').innerText = `Pregunta ${currentIdx + 1} de 26`;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        for (let i = 0; i < q.a.length; i += 2) {
            const div = document.createElement('div');
            div.className = 'option-item';
            div.innerText = q.a[i];
            div.onclick = () => selectOption(div, q.a[i+1]);
            container.appendChild(div);
        }
        document.getElementById('next-btn').disabled = true;
    }

    function selectOption(el, val) {
        document.querySelectorAll('.option-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        selectedValue = val;
        document.getElementById('next-btn').disabled = false;
    }

    function nextQuestion() {
        score += selectedValue * questions[currentIdx].w;
        currentIdx++;
        if (currentIdx < questions.length) {
            showQuestion();
        } else {
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('lead-screen').classList.add('active');
        }
    }

    function submitLead() {
        document.getElementById('lead-screen').classList.remove('active');
        showResult();
        // Enviar a info@monapart.com vía backend o servicio tipo Formspree
    }

    function showResult() {
        document.getElementById('result-screen').classList.add('active');
        let title = "";
        let desc = "";
        let angle = 0; // -90 a 90 grados para el marcador SVG

        if (score <= 60) {
            title = "En Nómina";
            desc = score <= 30 ? resultTexts.nom_low : resultTexts.nom_high;
            angle = -90 + (score / 60) * 45;
        } else if (score <= 130) {
            title = "Autónomo con Broker";
            desc = score <= 95 ? resultTexts.bro_low : resultTexts.bro_high;
            angle = -45 + ((score - 60) / 70) * 45;
        } else if (score <= 255) {
            title = "Autónomo en Plataforma";
            if (score <= 160) desc = resultTexts.plat_1;
            else if (score <= 190) desc = resultTexts.plat_2;
            else if (score <= 225) desc = resultTexts.plat_3;
            else desc = resultTexts.plat_4;
            angle = 0 + ((score - 130) / 125) * 45;
        } else {
            title = "Autónomo en Solitario";
            desc = resultTexts.solo;
            angle = 45 + ((score - 255) / 39) * 45;
        }

        document.getElementById('result-title').innerText = title;
        document.getElementById('result-text').innerText = desc;
        // Animación aguja
        setTimeout(() => {
            document.getElementById('needle').style.transform = `rotate(${angle}deg)`;
        }, 300);
    }
</script>
